repos:
  -   repo: https://github.com/compilerla/conventional-pre-commit
      rev: v3.4.0
      hooks:
        -   id: conventional-pre-commit
            stages: [commit-msg]
            args: [feat, fix, chore, docs, style, refactor, test, build, ci, perf, revert]

  -   repo: local
      hooks:
        -   id: eslint-ts
            name: ESLint- Typescript lint
            language: system
            entry: bash -c 'cd mobile-wallet-cri-test-harness && npm run lint'
            files: ^mobile-wallet-cri-test-harness/.*\.(ts|md)$
            stages: [pre-commit]

        -   id: prettier-ts
            name: Prettier - format check
            language: system
            entry: bash -c 'cd mobile-wallet-cri-test-harness && npm run format:check'
            files: ^mobile-wallet-cri-test-harness/.*\.(ts|md)$
            stages: [pre-commit]

        -   id: jest-tests
            name: Jest - unit tests
            language: system
            entry: bash -c 'cd mobile-wallet-cri-test-harness && npm run test'
            files: ^mobile-wallet-cri-test-harness/.*\.ts$
            stages: [pre-push]